<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Among Us Simon Says</title>
<style>
  body {
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
  }

  h1 {
    margin-top:20px;
  }

  #game {
    width:420px;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(2,200px);
    grid-gap:20px;
  }

  .btn {
    width:200px;
    height:200px;
    border-radius:20px;
    opacity:0.7;
    cursor:pointer;
    transition:opacity 0.2s, transform 0.1s;
  }

  .btn.active {
    opacity:1;
    transform:scale(1.05);
  }

  #green { background:#2ecc71; }
  #red { background:#e74c3c; }
  #yellow { background:#f1c40f; }
  #blue { background:#3498db; }

  #status {
    margin-top:20px;
    font-size:18px;
  }
</style>
</head>
<body>

<h1>Simon Says</h1>

<div id="game">
  <div class="btn" id="green"></div>
  <div class="btn" id="red"></div>
  <div class="btn" id="yellow"></div>
  <div class="btn" id="blue"></div>
</div>

<div class="btn" id="start" onclick="startGame()">Start</div>
<div id="status">Press Start</div>

<script>
const colors = ["green","red","yellow","blue"];
let sequence = [];
let playerSequence = [];
let playing = false;
let showing = false;

function startGame(){
  sequence = [];
  playerSequence = [];
  playing = true;
  nextRound();
}

function nextRound(){
  playerSequence = [];
  const next = colors[Math.floor(Math.random()*4)];
  sequence.push(next);
  showSequence();
}

function showSequence(){
  showing = true;
  let i = 0;

  const interval = setInterval(()=>{
    flash(sequence[i]);
    i++;
    if(i >= sequence.length){
      clearInterval(interval);
      showing = false;
    }
  },600);
}

function flash(color){
  const el = document.getElementById(color);
  el.classList.add("active");
  setTimeout(()=>el.classList.remove("active"),300);
}

document.querySelectorAll(".btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    if(!playing || showing) return;

    const color = btn.id;
    flash(color);
    playerSequence.push(color);

    const index = playerSequence.length - 1;

    if(playerSequence[index] !== sequence[index]){
      document.getElementById("status").innerText="Wrong! Restarting...";
      setTimeout(startGame,1500);
      return;
    }

    if(playerSequence.length === sequence.length){
      document.getElementById("status").innerText="Good! Next round...";
      setTimeout(nextRound,1000);
    }
  });
});
</script>

</body>
</html>
